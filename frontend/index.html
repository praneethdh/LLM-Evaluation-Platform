<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="EvalForge — LLM Evaluation & Observability Platform. Systematically measure, compare, and improve your LLM outputs.">
    <title>EvalForge — LLM Evaluation Platform</title>
    <link rel="stylesheet" href="/css/styles.css">
    <!-- Chart.js from CDN -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.4/dist/chart.umd.min.js"></script>
</head>
<body>
    <div class="app-container">
        <!-- Sidebar Navigation -->
        <aside class="sidebar">
            <div class="sidebar-header">
                <div class="sidebar-logo">
                    <div class="logo-icon">⚡</div>
                    <div>
                        <h1>EvalForge</h1>
                        <span class="version">v1.0 — LLM Evaluation</span>
                    </div>
                </div>
            </div>

            <nav class="sidebar-nav">
                <div class="nav-item active" data-route="#dashboard">
                    <span class="nav-icon">📊</span>
                    <span>Dashboard</span>
                </div>
                <div class="nav-item" data-route="#suites">
                    <span class="nav-icon">📝</span>
                    <span>Test Suites</span>
                </div>
                <div class="nav-item" data-route="#run">
                    <span class="nav-icon">▶️</span>
                    <span>Run Evaluation</span>
                </div>
                <div class="nav-item" data-route="#results">
                    <span class="nav-icon">📈</span>
                    <span>Results</span>
                </div>
                <div class="nav-item" data-route="#compare">
                    <span class="nav-icon">⚖️</span>
                    <span>Compare</span>
                </div>
            </nav>

            <div class="sidebar-footer">
                <div style="font-size: 0.7rem; font-weight: 600; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 8px;">
                    Providers
                </div>
                <div id="provider-status">
                    <div class="provider-status">
                        <span class="status-dot not_configured"></span>
                        <span>Loading...</span>
                    </div>
                </div>
            </div>
        </aside>

        <!-- Main Content Area -->
        <main class="main-content" id="main-content">
            <!-- Dynamic content rendered by app.js -->
            <div class="page-header">
                <h2>Loading...</h2>
            </div>
            <div class="score-grid">
                <div class="skeleton skeleton-card"></div>
                <div class="skeleton skeleton-card"></div>
                <div class="skeleton skeleton-card"></div>
                <div class="skeleton skeleton-card"></div>
            </div>
        </main>
    </div>

    <script src="/js/app.js"></script>
</body>
</html>
